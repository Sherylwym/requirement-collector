<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>需求收集工具</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      background: #f0f2f5;
      color: #333;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #FF6B35 0%, #FF8C42 100%);
      color: white;
      padding: 24px 32px;
      box-shadow: 0 2px 12px rgba(255,107,53,0.3);
    }

    header h1 { font-size: 22px; font-weight: 600; }
    header p { font-size: 13px; opacity: 0.85; margin-top: 4px; }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    /* 标签页 */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .tab-btn {
      padding: 10px 24px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
      background: white;
      color: #666;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .tab-btn.active {
      background: #FF6B35;
      color: white;
      box-shadow: 0 2px 8px rgba(255,107,53,0.4);
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* 表单卡片 */
    .card {
      background: white;
      border-radius: 12px;
      padding: 28px 32px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .card h2 {
      font-size: 16px;
      font-weight: 600;
      color: #222;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 2px solid #FF6B35;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group.full-width {
      grid-column: 1 / -1;
    }

    label {
      font-size: 13px;
      font-weight: 500;
      color: #555;
    }

    label .required {
      color: #FF6B35;
      margin-left: 2px;
    }

    input, select, textarea {
      padding: 10px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      color: #333;
      transition: border-color 0.2s;
      font-family: inherit;
      outline: none;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #FF6B35;
      box-shadow: 0 0 0 3px rgba(255,107,53,0.1);
    }

    textarea { resize: vertical; min-height: 80px; }

    .benefit-input-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .benefit-input-wrap input {
      flex: 1;
    }

    .benefit-unit {
      font-size: 13px;
      color: #999;
      white-space: nowrap;
    }

    .form-actions {
      margin-top: 28px;
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }

    .btn {
      padding: 10px 28px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #FF6B35;
      color: white;
      box-shadow: 0 2px 8px rgba(255,107,53,0.35);
    }

    .btn-primary:hover { background: #e85d28; }

    .btn-secondary {
      background: #f5f5f5;
      color: #666;
    }

    .btn-secondary:hover { background: #ebebeb; }

    /* 需求列表 */
    .list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .list-controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .sort-select {
      padding: 8px 12px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      outline: none;
    }

    .sort-select:focus { border-color: #FF6B35; }

    .count-badge {
      background: #FF6B35;
      color: white;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }

    .empty-state {
      text-align: center;
      padding: 60px 0;
      color: #bbb;
    }

    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    /* 需求卡片列表 */
    .req-list { display: flex; flex-direction: column; gap: 12px; }

    .req-card {
      background: white;
      border-radius: 10px;
      padding: 20px 24px;
      box-shadow: 0 1px 8px rgba(0,0,0,0.06);
      border-left: 4px solid #FF6B35;
      transition: box-shadow 0.2s;
      position: relative;
    }

    .req-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); }

    .req-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .req-rank {
      font-size: 22px;
      font-weight: 700;
      color: #FF6B35;
      min-width: 32px;
      line-height: 1;
      margin-top: 2px;
    }

    .req-rank.top1 { color: #FFB800; }
    .req-rank.top2 { color: #9E9E9E; }
    .req-rank.top3 { color: #CD7F32; }

    .req-main { flex: 1; }

    .req-title {
      font-size: 16px;
      font-weight: 600;
      color: #222;
      margin-bottom: 6px;
    }

    .req-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      font-size: 12px;
      color: #888;
      margin-bottom: 8px;
    }

    .req-meta span { display: flex; align-items: center; gap: 3px; }

    .benefit-tag {
      background: #FFF3EE;
      color: #FF6B35;
      border: 1px solid #FFCAB4;
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }

    .req-desc {
      font-size: 13px;
      color: #666;
      line-height: 1.6;
      margin-top: 8px;
    }

    .req-desc-toggle {
      color: #FF6B35;
      cursor: pointer;
      font-size: 12px;
      margin-left: 6px;
    }

    .req-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .btn-sm {
      padding: 5px 14px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .btn-danger {
      background: #FFF0F0;
      color: #E53935;
    }

    .btn-danger:hover { background: #FFE0E0; }

    .btn-edit {
      background: #F0F7FF;
      color: #1976D2;
    }

    .btn-edit:hover { background: #DCEEFF; }

    /* 导出按钮 */
    .btn-export {
      background: #E8F5E9;
      color: #388E3C;
      padding: 8px 18px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .btn-export:hover { background: #C8E6C9; }

    /* Toast */
    .toast {
      position: fixed;
      top: 24px;
      right: 24px;
      background: #333;
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 9999;
      opacity: 0;
      transform: translateY(-10px);
      transition: all 0.3s;
      pointer-events: none;
    }

    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { background: #388E3C; }
    .toast.error { background: #D32F2F; }

    /* 编辑弹窗 */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.show { display: flex; }

    .modal {
      background: white;
      border-radius: 12px;
      padding: 28px 32px;
      width: 90%;
      max-width: 620px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }

    .modal h2 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 20px;
      color: #222;
    }

    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
      header { padding: 16px 16px; }
      .card { padding: 20px 16px; }
    }
  </style>
</head>
<body>

<header>
  <h1>📋 需求收集工具</h1>
  <p>业务方提交需求，系统自动按收益排序</p>
</header>

<div class="container">
  <!-- 标签页 -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('form')">➕ 提交需求</button>
    <button class="tab-btn" onclick="switchTab('list')">📊 需求排序</button>
  </div>

  <!-- 提交表单 -->
  <div id="tab-form" class="tab-panel active">
    <div class="card">
      <h2>填写需求信息</h2>
      <form id="reqForm" onsubmit="submitReq(event)">
        <div class="form-grid">
          <div class="form-group">
            <label>填写时间 <span class="required">*</span></label>
            <input type="date" id="f-date" required />
          </div>
          <div class="form-group">
            <label>归属周 <span class="required">*</span></label>
            <input type="text" id="f-week" placeholder="如：2024-W15" required />
          </div>
          <div class="form-group">
            <label>需求提出人 <span class="required">*</span></label>
            <input type="text" id="f-proposer" placeholder="请输入姓名" required />
          </div>
          <div class="form-group">
            <label>需求名称 <span class="required">*</span></label>
            <input type="text" id="f-name" placeholder="简洁描述需求" required />
          </div>
          <div class="form-group full-width">
            <label>需求背景 <span class="required">*</span></label>
            <textarea id="f-background" rows="3" placeholder="为什么提这个需求？现在有什么问题？" required></textarea>
          </div>
          <div class="form-group full-width">
            <label>需求详述</label>
            <textarea id="f-detail" rows="4" placeholder="具体要做什么？功能描述、交互逻辑等"></textarea>
          </div>
          <div class="form-group full-width">
            <label>需求收益 <span class="required">*</span> <span style="font-size:12px;color:#999;font-weight:400;">（请填写数值，如预计GMV增长、节省工时等）</span></label>
            <div class="benefit-input-wrap">
              <input type="number" id="f-benefit" placeholder="如：50000" min="0" step="any" required />
              <select id="f-benefit-unit" style="width:160px;">
                <option value="万元GMV">万元GMV</option>
                <option value="万元收入">万元收入</option>
                <option value="工时/月">工时/月（节省）</option>
                <option value="万DAU">万DAU</option>
                <option value="自定义">自定义</option>
              </select>
            </div>
            <input type="text" id="f-benefit-custom" placeholder="自定义单位说明" style="margin-top:8px;display:none;" />
          </div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" onclick="resetForm()">重置</button>
          <button type="submit" class="btn btn-primary">提交需求 ✓</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 需求列表 -->
  <div id="tab-list" class="tab-panel">
    <div class="list-header">
      <div style="display:flex;align-items:center;gap:10px;">
        <span style="font-size:15px;font-weight:600;">需求排序列表</span>
        <span class="count-badge" id="req-count">0</span>
      </div>
      <div class="list-controls">
        <select class="sort-select" id="sort-select" onchange="renderList()">
          <option value="benefit-desc">收益 ↓ 高到低</option>
          <option value="benefit-asc">收益 ↑ 低到高</option>
          <option value="date-desc">时间 ↓ 最新</option>
          <option value="date-asc">时间 ↑ 最早</option>
        </select>
        <button class="btn-export" onclick="exportCSV()">📥 导出 CSV</button>
      </div>
    </div>
    <div id="req-list-container"></div>
  </div>
</div>

<!-- 编辑弹窗 -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h2>✏️ 编辑需求</h2>
    <div class="form-grid">
      <div class="form-group">
        <label>填写时间</label>
        <input type="date" id="e-date" />
      </div>
      <div class="form-group">
        <label>归属周</label>
        <input type="text" id="e-week" />
      </div>
      <div class="form-group">
        <label>需求提出人</label>
        <input type="text" id="e-proposer" />
      </div>
      <div class="form-group">
        <label>需求名称</label>
        <input type="text" id="e-name" />
      </div>
      <div class="form-group full-width">
        <label>需求背景</label>
        <textarea id="e-background" rows="3"></textarea>
      </div>
      <div class="form-group full-width">
        <label>需求详述</label>
        <textarea id="e-detail" rows="4"></textarea>
      </div>
      <div class="form-group full-width">
        <label>需求收益</label>
        <div class="benefit-input-wrap">
          <input type="number" id="e-benefit" min="0" step="any" />
          <select id="e-benefit-unit" style="width:160px;">
            <option value="万元GMV">万元GMV</option>
            <option value="万元收入">万元收入</option>
            <option value="工时/月">工时/月（节省）</option>
            <option value="万DAU">万DAU</option>
            <option value="自定义">自定义</option>
          </select>
        </div>
        <input type="text" id="e-benefit-custom" placeholder="自定义单位说明" style="margin-top:8px;" />
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="closeEditModal()">取消</button>
      <button class="btn btn-primary" onclick="saveEdit()">保存修改</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // ——— 数据存储 ———
  const STORAGE_KEY = 'req_collector_data';

  function getData() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch(e) { return []; }
  }

  function saveData(data) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  // ——— 初始化 ———
  window.addEventListener('DOMContentLoaded', () => {
    // 默认填今天日期
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('f-date').value = today;

    // 默认填当前周
    document.getElementById('f-week').value = getCurrentWeek();

    // 收益单位切换
    document.getElementById('f-benefit-unit').addEventListener('change', function() {
      document.getElementById('f-benefit-custom').style.display = this.value === '自定义' ? 'block' : 'none';
    });
    document.getElementById('e-benefit-unit').addEventListener('change', function() {
      document.getElementById('e-benefit-custom').style.display = this.value === '自定义' ? 'block' : 'none';
    });

    renderList();
  });

  function getCurrentWeek() {
    const now = new Date();
    const startOfYear = new Date(now.getFullYear(), 0, 1);
    const weekNum = Math.ceil(((now - startOfYear) / 86400000 + startOfYear.getDay() + 1) / 7);
    return `${now.getFullYear()}-W${String(weekNum).padStart(2,'0')}`;
  }

  // ——— 标签切换 ———
  function switchTab(tab) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    document.querySelectorAll('.tab-btn')[tab === 'form' ? 0 : 1].classList.add('active');
    if (tab === 'list') renderList();
  }

  // ——— 提交需求 ———
  function submitReq(e) {
    e.preventDefault();
    const unit = document.getElementById('f-benefit-unit').value;
    const customUnit = document.getElementById('f-benefit-custom').value.trim();
    const benefitUnit = unit === '自定义' ? (customUnit || '自定义') : unit;

    const req = {
      id: Date.now(),
      date: document.getElementById('f-date').value,
      week: document.getElementById('f-week').value.trim(),
      proposer: document.getElementById('f-proposer').value.trim(),
      name: document.getElementById('f-name').value.trim(),
      background: document.getElementById('f-background').value.trim(),
      detail: document.getElementById('f-detail').value.trim(),
      benefit: parseFloat(document.getElementById('f-benefit').value),
      benefitUnit: benefitUnit,
    };

    const data = getData();
    data.push(req);
    saveData(data);

    showToast('需求提交成功！', 'success');
    resetForm();

    // 自动跳到列表页
    setTimeout(() => switchTab('list'), 800);
  }

  function resetForm() {
    document.getElementById('reqForm').reset();
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('f-date').value = today;
    document.getElementById('f-week').value = getCurrentWeek();
    document.getElementById('f-benefit-custom').style.display = 'none';
  }

  // ——— 渲染列表 ———
  function renderList() {
    const data = getData();
    const sortVal = document.getElementById('sort-select').value;
    document.getElementById('req-count').textContent = data.length;

    const sorted = [...data].sort((a, b) => {
      if (sortVal === 'benefit-desc') return b.benefit - a.benefit;
      if (sortVal === 'benefit-asc') return a.benefit - b.benefit;
      if (sortVal === 'date-desc') return b.date.localeCompare(a.date);
      if (sortVal === 'date-asc') return a.date.localeCompare(b.date);
      return 0;
    });

    const container = document.getElementById('req-list-container');

    if (sorted.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="icon">📭</div>
          <p>还没有需求，去提交第一条吧！</p>
        </div>`;
      return;
    }

    const rankLabels = ['🥇', '🥈', '🥉'];

    container.innerHTML = `<div class="req-list">${sorted.map((req, i) => {
      const rankClass = i < 3 ? ['top1','top2','top3'][i] : '';
      const rankIcon = i < 3 ? rankLabels[i] : `#${i+1}`;
      const detailHtml = req.detail
        ? `<div class="req-desc">${escHtml(req.detail.slice(0,80))}${req.detail.length > 80 ? `...<span class="req-desc-toggle" onclick="toggleDetail(this)">[展开]</span><span style="display:none">${escHtml(req.detail.slice(80))}</span>` : ''}</div>`
        : '';
      return `
        <div class="req-card">
          <div class="req-card-top">
            <div class="req-rank ${rankClass}">${rankIcon}</div>
            <div class="req-main">
              <div class="req-title">${escHtml(req.name)}</div>
              <div class="req-meta">
                <span>📅 ${req.date}</span>
                <span>📆 ${req.week}</span>
                <span>👤 ${escHtml(req.proposer)}</span>
              </div>
              <div class="req-desc" style="color:#555;"><strong>背景：</strong>${escHtml(req.background.slice(0,100))}${req.background.length>100?'...':''}</div>
              ${detailHtml}
            </div>
            <div class="benefit-tag">💰 ${req.benefit.toLocaleString()} ${escHtml(req.benefitUnit)}</div>
          </div>
          <div class="req-actions">
            <button class="btn-sm btn-edit" onclick="openEdit(${req.id})">编辑</button>
            <button class="btn-sm btn-danger" onclick="deleteReq(${req.id})">删除</button>
          </div>
        </div>`;
    }).join('')}</div>`;
  }

  function toggleDetail(el) {
    const hidden = el.nextElementSibling;
    if (hidden.style.display === 'none') {
      hidden.style.display = 'inline';
      el.textContent = '[收起]';
    } else {
      hidden.style.display = 'none';
      el.textContent = '[展开]';
    }
  }

  // ——— 删除 ———
  function deleteReq(id) {
    if (!confirm('确认删除这条需求？')) return;
    const data = getData().filter(r => r.id !== id);
    saveData(data);
    renderList();
    showToast('已删除', 'success');
  }

  // ——— 编辑 ———
  let editingId = null;

  function openEdit(id) {
    const req = getData().find(r => r.id === id);
    if (!req) return;
    editingId = id;
    document.getElementById('e-date').value = req.date;
    document.getElementById('e-week').value = req.week;
    document.getElementById('e-proposer').value = req.proposer;
    document.getElementById('e-name').value = req.name;
    document.getElementById('e-background').value = req.background;
    document.getElementById('e-detail').value = req.detail || '';
    document.getElementById('e-benefit').value = req.benefit;

    const knownUnits = ['万元GMV','万元收入','工时/月（节省）','万DAU'];
    const unitSel = document.getElementById('e-benefit-unit');
    const customInput = document.getElementById('e-benefit-custom');
    if (knownUnits.includes(req.benefitUnit)) {
      unitSel.value = req.benefitUnit;
      customInput.style.display = 'none';
    } else {
      unitSel.value = '自定义';
      customInput.value = req.benefitUnit;
      customInput.style.display = 'block';
    }

    document.getElementById('editModal').classList.add('show');
  }

  function closeEditModal() {
    document.getElementById('editModal').classList.remove('show');
    editingId = null;
  }

  function saveEdit() {
    if (!editingId) return;
    const data = getData();
    const idx = data.findIndex(r => r.id === editingId);
    if (idx === -1) return;

    const unit = document.getElementById('e-benefit-unit').value;
    const customUnit = document.getElementById('e-benefit-custom').value.trim();
    const benefitUnit = unit === '自定义' ? (customUnit || '自定义') : unit;

    data[idx] = {
      ...data[idx],
      date: document.getElementById('e-date').value,
      week: document.getElementById('e-week').value.trim(),
      proposer: document.getElementById('e-proposer').value.trim(),
      name: document.getElementById('e-name').value.trim(),
      background: document.getElementById('e-background').value.trim(),
      detail: document.getElementById('e-detail').value.trim(),
      benefit: parseFloat(document.getElementById('e-benefit').value),
      benefitUnit,
    };

    saveData(data);
    closeEditModal();
    renderList();
    showToast('修改已保存', 'success');
  }

  // ——— 导出 CSV ———
  function exportCSV() {
    const data = getData();
    if (data.length === 0) { showToast('没有数据可以导出', 'error'); return; }

    const sortVal = document.getElementById('sort-select').value;
    const sorted = [...data].sort((a, b) => {
      if (sortVal === 'benefit-desc') return b.benefit - a.benefit;
      if (sortVal === 'benefit-asc') return a.benefit - b.benefit;
      if (sortVal === 'date-desc') return b.date.localeCompare(a.date);
      if (sortVal === 'date-asc') return a.date.localeCompare(b.date);
      return 0;
    });

    const headers = ['排名','填写时间','归属周','需求提出人','需求名称','需求背景','需求详述','需求收益','收益单位'];
    const rows = sorted.map((r, i) => [
      i+1, r.date, r.week, r.proposer, r.name,
      r.background, r.detail || '', r.benefit, r.benefitUnit
    ].map(v => `"${String(v).replace(/"/g,'""')}"`));

    const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `需求列表_${new Date().toISOString().split('T')[0]}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('导出成功！', 'success');
  }

  // ——— 工具函数 ———
  function escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  function showToast(msg, type='') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + type;
    setTimeout(() => t.className = 'toast', 2500);
  }
</script>
